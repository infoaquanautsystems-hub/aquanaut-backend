<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | AquaNaut</title>

<style>
:root {
    --primary-blue: #005f73;
    --deep-ocean: #001219;
    --accent-teal: #0a9396;
    --light-bg: #f4f4f4;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--light-bg);
}

header {
    background: var(--deep-ocean);
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card h3 {
    margin-bottom: 10px;
}

.value {
    font-size: 2rem;
    color: var(--accent-teal);
}

#map {
    height: 400px;
    margin-top: 20px;
    border-radius: 10px;
}
</style>

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<header>
    <h1>AquaNaut Command Center</h1>
</header>

<div class="container">

    <div class="grid">
        <div class="card">
            <h3>Total Waste Collected</h3>
            <div class="value" id="waste">0 kg</div>
        </div>

        <div class="card">
            <h3>Active Bots</h3>
            <div class="value" id="bots">0</div>
        </div>

        <div class="card">
            <h3>Pollution Level</h3>
            <div class="value" id="pollution">Low</div>
        </div>
    </div>

    <h2 style="margin-top:30px;">Bot Locations</h2>
    <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Initialize map
const map = L.map('map').setView([6.5244, 3.3792], 12);

// Map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// Example bot marker
L.marker([6.5244, 3.3792]).addTo(map)
    .bindPopup("Bot 1 - Active")
    .openPopup();

// Load backend data
async function loadDashboard() {
    const res = await fetch("http://localhost:5000/data", {
        headers: {
            Authorization: localStorage.getItem("token")
        }
    });

    const data = await res.json();

    document.getElementById("waste").innerText = data.totalWaste + " kg";
    document.getElementById("bots").innerText = data.activeBots;
    document.getElementById("pollution").innerText = data.pollutionLevel;
}

loadDashboard();
</script>

</body>
</html>
